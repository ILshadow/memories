<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ذكرياتنا - Our Memories</title>
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Cairo, Inter & Dancing Script -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=Dancing+Script:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons via CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                    },
                    colors: {
                        rose: {
                            50: '#fff1f2',
                            100: '#ffe4e6',
                            200: '#fecdd3',
                            300: '#fda4af',
                            400: '#fb7185',
                            500: '#f43f5e',
                            600: '#e11d48',
                        },
                        pink: {
                            50: '#fdf2f8',
                            100: '#fce7f3',
                            200: '#fbcfe8',
                            500: '#ec4899',
                            600: '#db2777',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Custom Styles -->
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #fdf2f8; 
        }
        .polaroid {
            background: white;
            padding: 12px 12px 16px 12px;
            box-shadow: 0 10px 20px -5px rgba(255, 192, 203, 0.4);
            transition: all 0.3s ease;
            position: relative;
            border-radius: 24px;
            border: 1px solid rgba(255, 228, 230, 0.8);
        }
        .polaroid:hover {
            box-shadow: 0 20px 25px -5px rgba(14, 165, 233, 0.2);
            transform: scale(1.05) rotate(0deg) !important;
            z-index: 10;
        }
        .floating-icon { animation: float 6s ease-in-out infinite; }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .pulse-icon { animation: pulse-soft 4s ease-in-out infinite; }
        @keyframes pulse-soft {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-pink-50 via-rose-50 to-pink-100 py-8 sm:py-12 px-4 sm:px-6 lg:px-8 relative overflow-x-hidden">
    
    <!-- Floating Background Elements -->
    <div class="absolute top-10 left-10 text-rose-200 pulse-icon"><i data-lucide="heart" width="48" height="48"></i></div>
    <div class="absolute top-40 right-20 text-sky-200 floating-icon" style="animation-duration: 5s;"><i data-lucide="star" width="32" height="32"></i></div>
    <div class="absolute bottom-20 left-1/4 text-pink-200 pulse-icon" style="animation-duration: 7s;"><i data-lucide="heart" width="64" height="64"></i></div>
    <div class="absolute top-1/3 left-1/3 text-rose-100 floating-icon" style="animation-duration: 8s;"><i data-lucide="heart" width="24" height="24"></i></div>
    <div class="absolute bottom-1/3 right-1/4 text-sky-100 pulse-icon" style="animation-duration: 6s;"><i data-lucide="cloud" width="48" height="48"></i></div>

    <div class="max-w-6xl mx-auto relative z-10">
        
        <!-- Header -->
        <header class="text-center mb-12 sm:mb-16">
            <h1 class="text-6xl md:text-8xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-rose-400 via-pink-500 to-rose-500 mb-4 drop-shadow-sm py-2" style="font-family: 'Dancing Script', cursive; line-height: 1.2;">
                Our Memories
            </h1>
            <p class="text-2xl sm:text-3xl md:text-4xl text-rose-400 font-semibold flex items-center justify-center gap-2" style="font-family: 'Dancing Script', cursive;">
                <i data-lucide="heart" class="fill-rose-400 text-rose-400" width="28" height="28"></i>
                Memories with doudou
                <i data-lucide="star" class="fill-sky-300 text-sky-300" width="24" height="24"></i>
            </p>
        </header>

        <!-- Sync Button -->
        <div class="flex justify-center mb-10 sm:mb-12">
            <button id="refresh-btn" class="cursor-pointer group relative flex items-center gap-3 bg-white px-6 sm:px-8 py-3 sm:py-4 rounded-full shadow-sm hover:shadow-md hover:border-sky-200 transition-all border border-rose-100">
                <div class="w-10 h-10 sm:w-12 sm:h-12 bg-rose-50 group-hover:bg-sky-50 rounded-full flex items-center justify-center text-rose-400 group-hover:text-sky-400 transition-colors">
                    <i data-lucide="refresh-cw" class="group-hover:rotate-180 transition-transform duration-500"></i>
                </div>
                <div class="text-right">
                    <span class="block text-gray-700 font-bold text-base sm:text-lg">تحديث الصور</span>
                    <span class="block text-gray-400 text-xs sm:text-sm">جلب الجديد من Google Drive</span>
                </div>
            </button>
        </div>

        <!-- Error Message -->
        <div id="error-message" class="hidden bg-red-100 border border-red-200 text-red-600 p-4 rounded-xl mb-8 text-center max-w-md mx-auto shadow-sm"></div>

        <!-- Empty State -->
        <div id="empty-state" class="text-center text-gray-400 mt-20 flex flex-col items-center">
            <i data-lucide="camera" width="64" height="64" class="mb-4 opacity-20"></i>
            <p class="text-xl">لا توجد صور بعد. أضف بعض الذكريات الجميلة!</p>
        </div>

        <!-- Photo Grid -->
        <div id="photo-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8 hidden">
            <!-- Photos will be injected here by JavaScript -->
        </div>
    </div>



    <!-- Image Modal -->
    <div id="image-modal" class="fixed inset-0 z-50 bg-gradient-to-br from-pink-50/95 to-sky-50/95 backdrop-blur-md hidden flex-col items-center justify-center opacity-0 transition-opacity duration-300 p-4 sm:p-8">
        <button id="modal-close" class="absolute top-4 right-4 sm:top-6 sm:right-6 bg-white text-rose-400 hover:text-rose-600 hover:bg-rose-50 hover:scale-110 transition-all p-2 rounded-full shadow-md z-50">
            <i data-lucide="x" width="28" height="28"></i>
        </button>
        
        <div class="relative max-w-5xl max-h-[70vh] w-full flex justify-center items-center">
            <img id="modal-image" src="" alt="" class="max-w-full max-h-[70vh] object-contain rounded-3xl shadow-2xl border-4 border-white" />
        </div>
        
        <div class="mt-6 sm:mt-8 flex flex-col items-center gap-4 z-50 w-full px-4">
            <a id="modal-download" href="#" target="_blank" title="تحميل الصورة" class="flex items-center justify-center bg-gradient-to-r from-pink-400 to-sky-400 hover:from-pink-500 hover:to-sky-500 text-white w-14 h-14 sm:w-16 sm:h-16 rounded-full transition-all shadow-lg hover:shadow-xl hover:-translate-y-1">
                <i data-lucide="download" width="28" height="28"></i>
            </a>
        </div>
    </div>

    <!-- Password Modal -->
    <div id="password-modal" class="fixed inset-0 z-[60] bg-black/60 backdrop-blur-sm hidden flex-col items-center justify-center opacity-0 transition-opacity duration-300 p-4">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl transform scale-95 transition-transform duration-300 flex flex-col items-center text-center">
            <div class="w-16 h-16 bg-pink-100 text-pink-500 rounded-full flex items-center justify-center mb-4">
                <i data-lucide="lock" width="32" height="32"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">كلمة المرور مطلوبة</h2>
            <p class="text-gray-500 mb-6">هذه الذكريات خاصة بكما فقط. يرجى إدخال كلمة المرور لرؤيتها.</p>
            <input type="password" id="password-input" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-pink-400 focus:ring-2 focus:ring-pink-200 outline-none transition-all text-center text-lg mb-4" placeholder="••••••••" />
            <p id="password-error" class="text-red-500 text-sm mb-4 hidden">كلمة المرور غير صحيحة!</p>
            <button id="password-submit" class="w-full bg-gradient-to-r from-pink-400 to-rose-400 hover:from-pink-500 hover:to-rose-500 text-white font-bold py-3 rounded-xl shadow-md hover:shadow-lg transition-all">
                دخول
            </button>
            <button id="password-cancel" class="mt-4 text-gray-400 hover:text-gray-600 transition-colors text-sm">
                إلغاء
            </button>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[100] hidden items-center justify-center flex-col gap-4">
        <i data-lucide="loader-2" class="animate-spin text-sky-500" width="48" height="48"></i>
        <p class="text-xl font-bold text-gray-800" id="loading-text">جاري المزامنة مع GitHub...</p>
    </div>

    <!-- Application Logic -->
    <script src="app.js"></script>
</body>
</html>
