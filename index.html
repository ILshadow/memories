<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ذكرياتنا - Our Memories</title>
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Cairo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons via CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                    },
                    colors: {
                        rose: {
                            50: '#fff1f2',
                            100: '#ffe4e6',
                            200: '#fecdd3',
                            300: '#fda4af',
                            400: '#fb7185',
                            500: '#f43f5e',
                            600: '#e11d48',
                        },
                        pink: {
                            50: '#fdf2f8',
                            100: '#fce7f3',
                            200: '#fbcfe8',
                            500: '#ec4899',
                            600: '#db2777',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Custom Styles -->
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #fdf2f8; 
        }
        .polaroid {
            background: white;
            padding: 1rem 1rem 1.5rem 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
            position: relative;
        }
        .polaroid:hover {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transform: scale(1.02) !important;
            z-index: 10;
        }
        .floating-icon { animation: float 6s ease-in-out infinite; }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .pulse-icon { animation: pulse-soft 4s ease-in-out infinite; }
        @keyframes pulse-soft {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-pink-50 to-rose-100 py-12 px-4 sm:px-6 lg:px-8 relative overflow-x-hidden">
    
    <!-- Floating Background Elements -->
    <div class="absolute top-10 left-10 text-rose-200 pulse-icon"><i data-lucide="heart" width="48" height="48"></i></div>
    <div class="absolute top-40 right-20 text-pink-200 floating-icon" style="animation-duration: 5s;"><i data-lucide="star" width="32" height="32"></i></div>
    <div class="absolute bottom-20 left-1/4 text-rose-200 pulse-icon" style="animation-duration: 7s;"><i data-lucide="heart" width="64" height="64"></i></div>
    <div class="absolute top-1/3 left-1/3 text-rose-100 floating-icon" style="animation-duration: 8s;"><i data-lucide="heart" width="24" height="24"></i></div>
    <div class="absolute bottom-1/3 right-1/4 text-pink-200 pulse-icon" style="animation-duration: 6s;"><i data-lucide="star" width="48" height="48"></i></div>

    <div class="max-w-6xl mx-auto relative z-10">
        
        <!-- Header -->
        <header class="text-center mb-16">
            <h1 class="text-5xl md:text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-rose-500 to-pink-600 mb-4 drop-shadow-sm py-2">
                ذكرياتنا
            </h1>
            <p class="text-xl md:text-2xl text-rose-400 font-medium flex items-center justify-center gap-2">
                <i data-lucide="heart" class="fill-rose-400" width="24" height="24"></i>
                ذكريات مع صديقتي المفضلة
                <i data-lucide="heart" class="fill-rose-400" width="24" height="24"></i>
            </p>
        </header>

        <!-- Upload Button -->
        <div class="flex justify-center mb-12">
            <label class="cursor-pointer group relative">
                <div class="absolute -inset-1 bg-gradient-to-r from-rose-400 to-pink-500 rounded-full blur opacity-25 group-hover:opacity-75 transition duration-200"></div>
                <div class="relative px-8 py-4 bg-white rounded-full flex items-center gap-3 shadow-lg hover:shadow-xl transition-all transform group-hover:-translate-y-1">
                    <i data-lucide="camera" class="text-rose-500" width="28" height="28"></i>
                    <span class="text-xl font-bold text-gray-800">إضافة صورة جديدة</span>
                </div>
                <input type="file" accept="image/*" multiple class="hidden" id="file-upload" />
            </label>
        </div>

        <!-- Error Message -->
        <div id="error-message" class="hidden bg-red-100 border border-red-200 text-red-600 p-4 rounded-xl mb-8 text-center max-w-md mx-auto shadow-sm"></div>

        <!-- Empty State -->
        <div id="empty-state" class="text-center text-gray-400 mt-20 flex flex-col items-center">
            <i data-lucide="camera" width="64" height="64" class="mb-4 opacity-20"></i>
            <p class="text-xl">لا توجد صور بعد. أضف بعض الذكريات الجميلة!</p>
        </div>

        <!-- Photo Grid -->
        <div id="photo-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8 hidden">
            <!-- Photos will be injected here by JavaScript -->
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl border border-rose-100 transform transition-all">
            <div class="w-16 h-16 bg-rose-100 rounded-full flex items-center justify-center mx-auto mb-4 text-rose-500">
                <i data-lucide="trash-2" width="32" height="32"></i>
            </div>
            <h3 class="text-2xl font-bold text-gray-900 mb-2 text-center">حذف الصورة؟</h3>
            <p class="text-gray-500 text-center mb-8">هل أنت متأكد من حذف هذه الصورة؟ لا يمكن التراجع عن هذا الإجراء.</p>
            <div class="flex gap-3 justify-center">
                <button id="cancel-delete" class="flex-1 py-3 rounded-full bg-gray-100 text-gray-700 font-bold hover:bg-gray-200 transition-colors">إلغاء</button>
                <button id="confirm-delete" class="flex-1 py-3 rounded-full bg-rose-500 text-white font-bold hover:bg-rose-600 transition-colors shadow-md shadow-rose-200">حذف</button>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[100] hidden items-center justify-center flex-col gap-4">
        <i data-lucide="loader-2" class="animate-spin text-rose-500" width="48" height="48"></i>
        <p class="text-xl font-bold text-gray-800" id="loading-text">جاري المزامنة مع GitHub...</p>
    </div>

    <!-- Application Logic -->
    <script src="app.js"></script>
</body>
</html>
