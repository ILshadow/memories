<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ذكرياتنا - Our Memories</title>
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Cairo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons via CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                    },
                    colors: {
                        rose: {
                            50: '#fff1f2',
                            100: '#ffe4e6',
                            200: '#fecdd3',
                            300: '#fda4af',
                            400: '#fb7185',
                            500: '#f43f5e',
                            600: '#e11d48',
                        },
                        pink: {
                            50: '#fdf2f8',
                            100: '#fce7f3',
                            200: '#fbcfe8',
                            500: '#ec4899',
                            600: '#db2777',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Custom Styles -->
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #fdf2f8; 
        }
        .polaroid {
            background: white;
            padding: 1rem 1rem 1.5rem 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
            position: relative;
        }
        .polaroid:hover {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transform: scale(1.02) !important;
            z-index: 10;
        }
        .floating-icon { animation: float 6s ease-in-out infinite; }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .pulse-icon { animation: pulse-soft 4s ease-in-out infinite; }
        @keyframes pulse-soft {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-pink-50 to-rose-100 py-12 px-4 sm:px-6 lg:px-8 relative overflow-x-hidden">
    
    <!-- Floating Background Elements -->
    <div class="absolute top-10 left-10 text-rose-200 pulse-icon"><i data-lucide="heart" width="48" height="48"></i></div>
    <div class="absolute top-40 right-20 text-pink-200 floating-icon" style="animation-duration: 5s;"><i data-lucide="star" width="32" height="32"></i></div>
    <div class="absolute bottom-20 left-1/4 text-rose-200 pulse-icon" style="animation-duration: 7s;"><i data-lucide="heart" width="64" height="64"></i></div>
    <div class="absolute top-1/3 left-1/3 text-rose-100 floating-icon" style="animation-duration: 8s;"><i data-lucide="heart" width="24" height="24"></i></div>
    <div class="absolute bottom-1/3 right-1/4 text-pink-200 pulse-icon" style="animation-duration: 6s;"><i data-lucide="star" width="48" height="48"></i></div>

    <div class="max-w-6xl mx-auto relative z-10">
        
        <!-- Header -->
        <header class="text-center mb-16">
            <h1 class="text-5xl md:text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-rose-500 to-pink-600 mb-4 drop-shadow-sm py-2">
                ذكرياتنا
            </h1>
            <p class="text-xl md:text-2xl text-rose-400 font-medium flex items-center justify-center gap-2">
                <i data-lucide="heart" class="fill-rose-400" width="24" height="24"></i>
                ذكريات مع صديقتي المفضلة
                <i data-lucide="heart" class="fill-rose-400" width="24" height="24"></i>
            </p>
        </header>

        <!-- Upload Button -->
        <div class="flex justify-center mb-12">
            <label class="cursor-pointer group relative">
                <div class="absolute -inset-1 bg-gradient-to-r from-rose-400 to-pink-500 rounded-full blur opacity-25 group-hover:opacity-75 transition duration-200"></div>
                <div class="relative px-8 py-4 bg-white rounded-full flex items-center gap-3 shadow-lg hover:shadow-xl transition-all transform group-hover:-translate-y-1">
                    <i data-lucide="camera" class="text-rose-500" width="28" height="28"></i>
                    <span class="text-xl font-bold text-gray-800">إضافة صورة جديدة</span>
                </div>
                <input type="file" accept="image/*" multiple class="hidden" id="file-upload" />
            </label>
        </div>

        <!-- Error Message -->
        <div id="error-message" class="hidden bg-red-100 border border-red-200 text-red-600 p-4 rounded-xl mb-8 text-center max-w-md mx-auto shadow-sm"></div>

        <!-- Empty State -->
        <div id="empty-state" class="text-center text-gray-400 mt-20 flex flex-col items-center">
            <i data-lucide="camera" width="64" height="64" class="mb-4 opacity-20"></i>
            <p class="text-xl">لا توجد صور بعد. أضف بعض الذكريات الجميلة!</p>
        </div>

        <!-- Photo Grid -->
        <div id="photo-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8 hidden">
            <!-- Photos will be injected here by JavaScript -->
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl border border-rose-100 transform transition-all">
            <div class="w-16 h-16 bg-rose-100 rounded-full flex items-center justify-center mx-auto mb-4 text-rose-500">
                <i data-lucide="trash-2" width="32" height="32"></i>
            </div>
            <h3 class="text-2xl font-bold text-gray-900 mb-2 text-center">حذف الصورة؟</h3>
            <p class="text-gray-500 text-center mb-8">هل أنت متأكد من حذف هذه الصورة؟ لا يمكن التراجع عن هذا الإجراء.</p>
            <div class="flex gap-3 justify-center">
                <button id="cancel-delete" class="flex-1 py-3 rounded-full bg-gray-100 text-gray-700 font-bold hover:bg-gray-200 transition-colors">إلغاء</button>
                <button id="confirm-delete" class="flex-1 py-3 rounded-full bg-rose-500 text-white font-bold hover:bg-rose-600 transition-colors shadow-md shadow-rose-200">حذف</button>
            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        const AUTO_CAPTIONS = [
            "أفضل يوم على الإطلاق! ✨",
            "أحبك جداً 💖",
            "ذكريات لا تُنسى 🌟",
            "شخصي المفضل 🥰",
            "شريكتي في كل شيء 👯‍♀️",
            "دائماً وأبداً 💗",
            "لحظات حلوة 🍭",
            "توأم روحي 🌸"
        ];

        let photos = [];
        let photoToDelete = null;

        const fileUpload = document.getElementById('file-upload');
        const photoGrid = document.getElementById('photo-grid');
        const emptyState = document.getElementById('empty-state');
        const errorMessage = document.getElementById('error-message');
        const deleteModal = document.getElementById('delete-modal');
        const cancelDeleteBtn = document.getElementById('cancel-delete');
        const confirmDeleteBtn = document.getElementById('confirm-delete');

        // Load photos from localStorage on startup
        try {
            const stored = localStorage.getItem('scrapbook_photos');
            if (stored) {
                photos = JSON.parse(stored);
            }
        } catch (e) {
            console.error("Failed to load photos", e);
        }

        // Save photos to localStorage
        function savePhotos() {
            try {
                localStorage.setItem('scrapbook_photos', JSON.stringify(photos));
                errorMessage.classList.add('hidden');
            } catch (e) {
                console.error("Storage full", e);
                errorMessage.textContent = "عذراً، مساحة التخزين ممتلئة! لا يمكن حفظ المزيد من الصور.";
                errorMessage.classList.remove('hidden');
            }
        }

        // Generate unique ID
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substring(2);
        }

        // Compress image using Canvas API
        function compressImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        const MAX_HEIGHT = 800;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Compress to JPEG with 0.6 quality
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        }

        // Render the photo grid
        function renderPhotos() {
            if (photos.length === 0) {
                emptyState.classList.remove('hidden');
                photoGrid.classList.add('hidden');
                photoGrid.innerHTML = '';
                return;
            }

            emptyState.classList.add('hidden');
            photoGrid.classList.remove('hidden');
            photoGrid.innerHTML = '';

            photos.forEach(photo => {
                const card = document.createElement('div');
                card.className = 'polaroid group flex flex-col items-center rounded-sm';
                card.style.transform = `rotate(${photo.rotation}deg)`;
                card.id = `photo-${photo.id}`;

                card.innerHTML = `
                    <button onclick="requestDelete('${photo.id}')" class="absolute top-2 left-2 p-2 bg-rose-100 text-rose-600 rounded-full opacity-0 group-hover:opacity-100 transition-opacity duration-200 hover:bg-rose-200 z-10">
                        <i data-lucide="trash-2" width="18" height="18"></i>
                    </button>
                    <div class="w-full aspect-square overflow-hidden bg-gray-100 mb-4 rounded-sm">
                        <img src="${photo.dataUrl}" alt="Memory" class="w-full h-full object-cover" />
                    </div>
                    <div class="w-full text-center px-2 min-h-[3rem] flex items-center justify-center relative">
                        <p id="caption-text-${photo.id}" onclick="startEdit('${photo.id}')" class="text-gray-800 font-medium cursor-pointer hover:text-rose-600 transition-colors flex items-center gap-2">
                            <span>${photo.caption}</span>
                            <i data-lucide="edit-2" width="14" height="14" class="opacity-0 group-hover:opacity-50"></i>
                        </p>
                        <input type="text" id="caption-input-${photo.id}" class="hidden w-full text-center border-b-2 border-rose-300 focus:outline-none focus:border-rose-500 bg-transparent text-gray-800 font-medium" value="${photo.caption}">
                    </div>
                `;
                photoGrid.appendChild(card);
            });
            
            // Re-initialize icons for newly added elements
            lucide.createIcons();
        }

        // Edit Caption Logic
        window.startEdit = function(id) {
            const textEl = document.getElementById(`caption-text-${id}`);
            const inputEl = document.getElementById(`caption-input-${id}`);
            
            textEl.classList.add('hidden');
            inputEl.classList.remove('hidden');
            inputEl.focus();

            const saveEdit = () => {
                const newCaption = inputEl.value.trim() || "بدون تعليق";
                const photo = photos.find(p => p.id === id);
                if (photo) {
                    photo.caption = newCaption;
                    savePhotos();
                    renderPhotos();
                }
            };

            inputEl.addEventListener('blur', saveEdit, { once: true });
            inputEl.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    inputEl.blur();
                }
            });
        };

        // Delete Logic
        window.requestDelete = function(id) {
            photoToDelete = id;
            deleteModal.classList.remove('hidden');
            deleteModal.classList.add('flex');
        };

        cancelDeleteBtn.addEventListener('click', () => {
            photoToDelete = null;
            deleteModal.classList.add('hidden');
            deleteModal.classList.remove('flex');
        });

        confirmDeleteBtn.addEventListener('click', () => {
            if (photoToDelete) {
                photos = photos.filter(p => p.id !== photoToDelete);
                savePhotos();
                renderPhotos();
                photoToDelete = null;
                deleteModal.classList.add('hidden');
                deleteModal.classList.remove('flex');
            }
        });

        // Upload Logic
        fileUpload.addEventListener('change', async (e) => {
            const files = e.target.files;
            if (!files || files.length === 0) return;

            const newPhotos = [];
            for (let i = 0; i < files.length; i++) {
                try {
                    const dataUrl = await compressImage(files[i]);
                    const randomCaption = AUTO_CAPTIONS[Math.floor(Math.random() * AUTO_CAPTIONS.length)];
                    newPhotos.push({
                        id: generateId(),
                        dataUrl,
                        caption: randomCaption,
                        date: Date.now(),
                        rotation: Math.random() * 6 - 3 // Random rotation between -3 and +3 degrees
                    });
                } catch (err) {
                    console.error("Error compressing image", err);
                }
            }

            // Add new photos to the beginning of the array
            photos = [...newPhotos, ...photos];
            savePhotos();
            renderPhotos();
            e.target.value = ''; // Reset input so the same file can be uploaded again
        });

        // Initial render
        renderPhotos();
    </script>
</body>
</html>
